<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Ventas</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; padding: 40px; margin: 0; }
        .contenedor-tabla { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #007bff; color: white; font-weight: bold; }
        tr:hover { background-color: #f5f5f5; }
        .btn-volver { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .btn-volver:hover { background-color: #5a6268; }
        
        /* Estilos de tu nuevo botón Eliminar */
        .btn-eliminar {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-eliminar:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="contenedor-tabla">
        <a href="index.html" class="btn-volver">← Volver al Registro</a>
        <h2>Registro Total de Ventas</h2>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Total</th>
                    <th>Acciones</th> </tr>
            </thead>
            <tbody id="cuerpoTabla">
                </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', cargarDatos);

        // Separemos la carga de datos en una función para poder llamarla cuando borremos algo
        function cargarDatos() {
            fetch('http://localhost:5000/obtener_ventas')
                .then(response => response.json())
                .then(datos => {
                    const cuerpoTabla = document.getElementById('cuerpoTabla');
                    cuerpoTabla.innerHTML = ''; // Limpiamos la tabla antes de cargar
                    
                    if(datos.length === 0) {
                        cuerpoTabla.innerHTML = '<tr><td colspan="7" style="text-align: center;">No hay ventas registradas aún.</td></tr>';
                        return;
                    }

                    datos.forEach(venta => {
                        const fila = document.createElement('tr');
                        // Aquí agregamos tu botón de Eliminar que llama a la función eliminarVenta() pasándole el ID
                        fila.innerHTML = `
                            <td>${venta.id}</td>
                            <td>${venta.cliente}</td>
                            <td>${venta.producto}</td>
                            <td>${venta.cantidad}</td>
                            <td>S/ ${venta.precio.toFixed(2)}</td>
                            <td><strong>S/ ${venta.total.toFixed(2)}</strong></td>
                            <td>
                                <button onclick="eliminarVenta(${venta.id})" class="btn-eliminar">Eliminar</button>
                            </td>
                        `;
                        cuerpoTabla.appendChild(fila);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        // TU TAREA: Función para eliminar el registro
        function eliminarVenta(id) {
            // Confirmación de seguridad
            if (confirm('¿Estás seguro de que deseas eliminar este registro?')) {
                fetch(`http://localhost:5000/eliminar/${id}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    alert(data.mensaje);
                    cargarDatos(); // Volvemos a cargar la tabla para que el registro desaparezca al instante
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Hubo un error al intentar eliminar el registro.');
                });
            }
        }
    </script>
</body>
</html>
