<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ventas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor">
        <h2>Sistema de Ventas</h2>
        
        <div class="form-group">
            <label for="cliente">Cliente:</label>
            <input type="text" id="cliente" placeholder="Ingrese nombre del cliente">
        </div>

        <div class="form-group">
            <label for="producto">Producto:</label>
            <input type="text" id="producto" placeholder="Ingrese producto">
        </div>

        <div class="form-group">
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" placeholder="Ingrese cantidad">
        </div>

        <div class="form-group">
            <label for="precio">Precio Unitario:</label>
            <input type="number" step="0.01" id="precio" placeholder="Ingrese precio">
        </div>

        <div class="form-group">
            <label for="total">Total:</label>
            <input type="text" id="total" readonly>
        </div>

        <button type="button" id="btnCalcular" class="btn-calcular">Calcular Total</button>
        <button type="button" id="btnRegistrar" class="btn-registrar">Registrar Venta</button>
        <button type="button" id="btnVerRegistros" class="btn-ver">Ver Registros</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
